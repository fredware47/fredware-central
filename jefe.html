<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Horas Extras</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f6fa;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .header h1 {
            color: #2c3e50;
            font-size: 28px;
        }
        .header .subtitle {
            color: #7f8c8d;
            margin-top: 5px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            color: #2c3e50;
        }
        .stat-card .label {
            color: #7f8c8d;
            font-size: 14px;
            margin-top: 5px;
        }
        .filters {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .filter-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filter-group label {
            font-weight: 600;
            color: #2c3e50;
            font-size: 14px;
        }
        .filter-group input, .filter-group select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
        }
        .filter-group input:focus, .filter-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-refresh {
            padding: 10px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .btn-refresh:hover {
            transform: translateY(-2px);
        }
        .table-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .table-scroll {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        th {
            padding: 15px 20px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        td {
            padding: 15px 20px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }
        tr:hover {
            background: #f8f9fa;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-pendiente {
            background: #fff3cd;
            color: #856404;
        }
        .badge-aprobado {
            background: #d4edda;
            color: #155724;
        }
        .badge-rechazado {
            background: #f8d7da;
            color: #721c24;
        }
        .foto-thumb {
            max-width: 60px;
            max-height: 60px;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .foto-thumb:hover {
            transform: scale(2);
            z-index: 1000;
            position: relative;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
            font-weight: 600;
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #7f8c8d;
        }
        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        @media (max-width: 768px) {
            .filter-group {
                flex-direction: column;
                align-items: stretch;
            }
            th, td {
                padding: 10px 15px;
                font-size: 12px;
            }
            .stat-card .number {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📊 Panel de Control - Horas Extras</h1>
            <p class="subtitle">Visualiza y gestiona los registros de horas extra del personal de cocina</p>
            <div class="stats" id="statsContainer">
                <div class="stat-card">
                    <div class="number" id="totalRegistros">0</div>
                    <div class="label">Total Registros</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="totalHoras">0h</div>
                    <div class="label">Total Horas</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="personasUnicas">0</div>
                    <div class="label">Personas Registradas</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="registrosHoy">0</div>
                    <div class="label">Registros Hoy</div>
                </div>
            </div>
        </div>

        <!-- Filtros -->
        <div class="filters">
            <div class="filter-group">
                <label>📅 Desde:</label>
                <input type="date" id="fechaDesde">
                <label>Hasta:</label>
                <input type="date" id="fechaHasta">
                <label>👤 Personal:</label>
                <select id="filtroPersonal">
                    <option value="">Todos</option>
                </select>
                <button class="btn-refresh" onclick="cargarRegistros()">🔄 Actualizar</button>
            </div>
        </div>

        <!-- Tabla de Registros -->
        <div class="table-container">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>👤 Nombre</th>
                            <th>📅 Fecha</th>
                            <th>⏰ Inicio</th>
                            <th>⏰ Fin</th>
                            <th>⏱️ Total</th>
                            <th>📝 Comentarios</th>
                            <th>📸 Foto</th>
                            <th>📅 Registro</th>
                        </tr>
                    </thead>
                    <tbody id="tablaRegistros">
                        <tr>
                            <td colspan="8" class="loading">Cargando registros...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Configuración de Supabase
        const SUPABASE_URL = 'https://tu-proyecto.supabase.co';
        const SUPABASE_KEY = 'tu-anon-key-public';

        // Crear cliente de Supabase
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Cargar registros
        async function cargarRegistros() {
            try {
                const tbody = document.getElementById('tablaRegistros');
                tbody.innerHTML = '<tr><td colspan="8" class="loading">Cargando registros...</td></tr>';

                // Construir consulta
                let query = supabase
                    .from('horas_extra_registros')
                    .select('*')
                    .order('fecha', { ascending: false })
                    .order('hora_inicio', { ascending: false });

                // Aplicar filtros
                const fechaDesde = document.getElementById('fechaDesde').value;
                const fechaHasta = document.getElementById('fechaHasta').value;
                const filtroPersonal = document.getElementById('filtroPersonal').value;

                if (fechaDesde) {
                    query = query.gte('fecha', fechaDesde);
                }
                if (fechaHasta) {
                    query = query.lte('fecha', fechaHasta);
                }
                if (filtroPersonal) {
                    query = query.eq('nombre', filtroPersonal);
                }

                const { data: registros, error } = await query;

                if (error) throw error;

                // Actualizar estadísticas
                actualizarEstadisticas(registros);

                // Actualizar tabla
                if (registros && registros.length > 0) {
                    tbody.innerHTML = registros.map(registro => `
                        <tr>
                            <td><strong>${registro.nombre}</strong></td>
                            <td>${formatearFecha(registro.fecha)}</td>
                            <td>${registro.hora_inicio}</td>
                            <td>${registro.hora_fin}</td>
                            <td>${calcularHoras(registro.hora_inicio, registro.hora_fin)}h</td>
                            <td>${registro.comentarios || '-'}</td>
                            <td>${registro.foto_url ? `<img src="${registro.foto_url}" alt="Foto" class="foto-thumb" onclick="window.open('${registro.foto_url}', '_blank')">` : '-'}</td>
                            <td>${formatearFechaHora(registro.created_at)}</td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="8">
                                <div class="empty-state">
                                    <div class="icon">📭</div>
                                    <p>No hay registros de horas extra</p>
                                    <p style="font-size:12px; margin-top:10px;">Los registros aparecerán aquí cuando el personal registre sus horas</p>
                                </div>
                            </td>
                        </tr>
                    `;
                }

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('tablaRegistros').innerHTML = `
                    <tr>
                        <td colspan="8" style="text-align:center;color:#721c24;padding:40px;">
                            ❌ Error al cargar registros: ${error.message}
                        </td>
                    </tr>
                `;
            }
        }

        // Actualizar estadísticas
        function actualizarEstadisticas(registros) {
            if (!registros || registros.length === 0) {
                document.getElementById('totalRegistros').textContent = '0';
                document.getElementById('totalHoras').textContent = '0h';
                document.getElementById('personasUnicas').textContent = '0';
                document.getElementById('registrosHoy').textContent = '0';
                return;
            }

            // Total registros
            document.getElementById('totalRegistros').textContent = registros.length;

            // Total horas
            const totalHoras = registros.reduce((total, r) => {
                return total + parseFloat(calcularHoras(r.hora_inicio, r.hora_fin));
            }, 0);
            document.getElementById('totalHoras').textContent = totalHoras.toFixed(1) + 'h';

            // Personas únicas
            const personasUnicas = new Set(registros.map(r => r.nombre));
            document.getElementById('personasUnicas').textContent = personasUnicas.size;

            // Registros de hoy
            const hoy = new Date().toISOString().split('T')[0];
            const registrosHoy = registros.filter(r => r.fecha === hoy).length;
            document.getElementById('registrosHoy').textContent = registrosHoy;

            // Actualizar filtro de personal
            const selectPersonal = document.getElementById('filtroPersonal');
            const valorActual = selectPersonal.value;
            const opciones = Array.from(personasUnicas).sort();
            selectPersonal.innerHTML = `
                <option value="">Todos</option>
                ${opciones.map(n => `<option value="${n}" ${n === valorActual ? 'selected' : ''}>${n}</option>`).join('')}
            `;
        }

        // Calcular horas entre dos horas
        function calcularHoras(inicio, fin) {
            const [h1, m1] = inicio.split(':').map(Number);
            const [h2, m2] = fin.split(':').map(Number);
            let horas = h2 - h1;
            let minutos = m2 - m1;
            if (minutos < 0) {
                horas--;
                minutos += 60;
            }
            return (horas + minutos / 60).toFixed(1);
        }

        // Formatear fecha
        function formatearFecha(fecha) {
            if (!fecha) return '-';
            const [year, month, day] = fecha.split('-');
            return `${day}/${month}/${year}`;
        }

        // Formatear fecha y hora
        function formatearFechaHora(fechaHora) {
            if (!fechaHora) return '-';
            const fecha = new Date(fechaHora);
            return fecha.toLocaleString('es-ES', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // Configurar fechas por defecto (últimos 7 días)
        function configurarFechasDefecto() {
            const hoy = new Date();
            const hace7Dias = new Date(hoy);
            hace7Dias.setDate(hoy.getDate() - 7);
            
            document.getElementById('fechaDesde').value = hace7Dias.toISOString().split('T')[0];
            document.getElementById('fechaHasta').value = hoy.toISOString().split('T')[0];
        }

        // Inicializar
        configurarFechasDefecto();
        cargarRegistros();

        // Actualizar automáticamente cada 60 segundos
        setInterval(cargarRegistros, 60000);

        // Escuchar cambios en filtros para actualizar automáticamente
        document.querySelectorAll('.filter-group input, .filter-group select').forEach(element => {
            element.addEventListener('change', cargarRegistros);
        });
    </script>
</body>
</html>
