<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚚 Fredware - Terminal Unificada de Cocina</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        /* 🏗️ ESTILOS PARA EL ACORDEÓN DESPLEGABLE EN LA TABLET */
        .accordion-header { padding: 14px; font-size: 14px; font-weight: bold; border-radius: 12px; margin-top: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid #cbd5e1; user-select: none; transition: background 0.2s, transform 0.1s; }
        .accordion-header:active { transform: scale(0.99); }
        .accordion-content { display: block; padding: 4px 0; }
        .accordion-content.collapsed { display: none; }
        .accordion-icon { font-size: 12px; transition: transform 0.2s; color: inherit; }
        .accordion-header.active .accordion-icon { transform: rotate(180deg); }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen pb-8 select-none font-sans">

    <header class="bg-white border-b border-slate-300 py-4 px-6 sticky top-0 z-50 shadow-sm">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-3xl">🚚</span>
                <div>
                    <h1 class="text-lg font-black tracking-tight text-slate-900">FREDWARE CENTRAL</h1>
                    <p class="text-xs text-emerald-600 font-bold tracking-widest uppercase">Cocina, Recepción & Congelación</p>
                </div>
            </div>
            <div class="flex items-center space-x-2">
                <button onclick="abrirEntradaDirecta()" class="bg-amber-500 hover:bg-amber-600 text-white font-black text-xs px-3 py-2 rounded-xl border border-amber-600 shadow-sm transition-all active:scale-95">
                    ➕ ENTRADA DIRECTA
                </button>
                <span class="bg-slate-200 text-slate-700 text-xs px-2.5 py-2 rounded-xl border border-slate-300 font-mono font-bold">v6.4</span>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto w-full px-4 mt-6 space-y-6">
        
        <div class="bg-white border border-slate-250 rounded-2xl p-5 shadow-sm space-y-4">
            <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider flex items-center gap-2">
                <span>📝</span> Control de Faltas Diarias
            </h2>
            <div class="flex gap-2">
                <input type="text" id="insumo-falta" placeholder="Ej: MAYONESA, CEBOLLAS..." class="flex-1 bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-sky-500 uppercase text-base shadow-inner">
                <button onclick="registrarFaltaCocina()" class="bg-sky-600 hover:bg-sky-500 text-white font-bold px-5 rounded-xl shadow-sm transition-all active:scale-95">
                    ➕ Añadir
                </button>
            </div>
            <div id="contenedor-faltas-local" class="space-y-2 pt-2 max-h-40 overflow-y-auto"></div>
        </div>

        <div class="bg-white border border-slate-250 rounded-2xl p-5 shadow-sm space-y-4">
            <h2 class="text-sm font-bold text-emerald-600 uppercase tracking-wider flex items-center gap-2">
                <span>🚛</span> Entradas Esperadas Hoy (Check & Trazabilidad)
            </h2>
            <div id="visor-repartos-hoy" class="space-y-4"></div>
        </div>

        <div id="qrcode" class="hidden"></div>
    </main>

    <script>
        const API_URL = "https://untried-january-thinning.ngrok-free.dev";
        let cestaGlobal = [];

        // --- SISTEMA DE COMUNICACIÓN ---
        async function sincronizarConOficina(endpoint, datos) {
            try {
                const response = await fetch(`${API_URL}/api/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify(datos)
                });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
            } catch (error) { console.error("Error pasivo:", error); }
        }

        async function cargarDatosDeOficina() {
            try {
                const respuesta = await fetch(`${API_URL}/api/datos`, { headers: { 'ngrok-skip-browser-warning': 'true' } });
                if (!respuesta.ok) throw new Error("Gateway Error");
                const db = await respuesta.json();
                
                if (db.cesta) cestaGlobal = db.cesta;
                if (db.faltas) localStorage.setItem('fredware_faltas_cocina', JSON.stringify(db.faltas));
                if (db.cesta) localStorage.setItem('fredware_cesta_compras', JSON.stringify(db.cesta));
                if (db.proveedores) localStorage.setItem('fredware_proveedores', JSON.stringify(db.proveedores));
                
                renderFaltasLocales();
                renderCheckMercancia(db.proveedores || [], db.cesta || []);
            } catch (error) {
                console.log("Fallo de red en pasarela central. Tirando de base de datos local.");
                renderFaltasLocales();
                const provs = JSON.parse(localStorage.getItem('fredware_proveedores')) || [];
                cestaGlobal = JSON.parse(localStorage.getItem('fredware_cesta_compras')) || [];
                renderCheckMercancia(provs, cestaGlobal);
            }
        }

        // --- GESTIÓN DE FALTAS ---
        function registrarFaltaCocina() {
            const input = document.getElementById('insumo-falta');
            const valor = input.value.trim().toUpperCase();
            if(!valor) return;

            if(valor.length < 3) {
                Swal.fire({ icon: 'warning', title: 'Texto muy corto', text: 'Escribe al menos 3 letras para registrar la falta.', background: '#ffffff', color: '#000' });
                return;
            }

            let faltas = JSON.parse(localStorage.getItem('fredware_faltas_cocina')) || [];
            
            if(faltas.includes(valor)) {
                Swal.fire({ icon: 'info', title: 'Ya registrado', text: 'Este insumo ya está anotado en la lista.', background: '#ffffff', color: '#000' });
                return;
            }

            faltas.push(valor);
            localStorage.setItem('fredware_faltas_cocina', JSON.stringify(faltas));
            sincronizarConOficina('faltas', faltas);
            input.value = '';
            renderFaltasLocales();
        }

        function renderFaltasLocales() {
            const faltas = JSON.parse(localStorage.getItem('fredware_faltas_cocina')) || [];
            const container = document.getElementById('contenedor-faltas-local');
            if(!container) return;
            container.innerHTML = '';
            if(faltas.length === 0) {
                container.innerHTML = `<div class="text-center italic text-slate-400 text-xs py-2">No hay faltas apuntadas hoy.</div>`;
                return;
            }
            faltas.forEach((item, idx) => {
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 border border-slate-200 px-4 py-2.5 rounded-xl shadow-sm">
                        <span class="text-sm font-bold text-amber-600">⚠️ ${item}</span>
                        <button onclick="borrarFaltaLocal(${idx})" class="text-xs bg-red-50 text-red-600 border border-red-200 px-2.5 py-1 rounded-lg font-bold hover:bg-red-600 hover:text-white transition-colors">Eliminar</button>
                    </div>
                `;
            });
        }

        function borrarFaltaLocal(idx) {
            let faltas = JSON.parse(localStorage.getItem('fredware_faltas_cocina')) || [];
            if (idx >= 0 && idx < faltas.length) {
                faltas.splice(idx, 1);
                localStorage.setItem('fredware_faltas_cocina', JSON.stringify(faltas));
                sincronizarConOficina('faltas', faltas);
            }
            renderFaltasLocales();
        }

        // --- PANEL DE REPARTO ---
        function renderCheckMercancia(proveedores, cesta) {
            const container = document.getElementById('visor-repartos-hoy');
            if(!container) return;
            container.innerHTML = '';

            const hoyIdx = new Date().getDay();
            let repartosHoy = proveedores.filter(p => p.dias_reparto && p.dias_reparto.includes(hoyIdx));

            if(repartosHoy.length === 0) {
                container.innerHTML = `<div class="italic text-slate-400 text-sm text-center py-4">Ningún reparto programado en agenda para hoy.</div>`;
                return;
            }

            const estadosColapsados = JSON.parse(localStorage.getItem('fredware_cocina_acordeon_estados')) || {};
            const ahora = new Date();

            repartosHoy.forEach(p => {
                let articulosDelProveedor = cesta.filter(item => item.proveedor_id === p.nombre && item.estado !== "RECIBIDO");
                if (articulosDelProveedor.length === 0) return;

                let maxDiasRetraso = 0;
                
                let htmlArticulos = '';
                articulosDelProveedor.forEach(item => {
                    let idxReal = cesta.findIndex(c => c.detalle === item.detalle && c.proveedor_id === p.nombre && c.estado !== "RECIBIDO");
                    
                    if (item.fecha_registro) {
                        let fechaRegistro = new Date(item.fecha_registro);
                        let diferenciaTiempo = ahora - fechaRegistro;
                        let diasDiferencia = Math.floor(diferenciaTiempo / (1000 * 60 * 60 * 24));
                        if (diasDiferencia > maxDiasRetraso) maxDiasRetraso = diasDiferencia;
                    }

                    // 🔧 MEJORA v6.4: Agregado el botón secundario "No llegó" con su propio trigger independiente
                    htmlArticulos += `
                        <div class="flex justify-between items-center py-3 border-b border-slate-100 last:border-none">
                            <span class="text-sm font-semibold text-slate-700">📦 ${item.detalle}</span>
                            <div class="flex space-x-2">
                                <button onclick="marcarProductoNoLlego(${idxReal})" class="bg-slate-200 hover:bg-red-200 text-slate-700 hover:text-red-700 text-xs font-bold px-2.5 py-2 rounded-xl transition-all active:scale-95 shadow-sm border border-slate-300">
                                    ❌ No llegó
                                </button>
                                <button onclick="abrirFlujoRecepcion('${item.detalle.replace(/'/g, "\\'")}', '${p.nombre}', ${idxReal})" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-black px-3 py-2 rounded-xl transition-all active:scale-95 shadow-sm">
                                    📥 Recibir
                                </button>
                            </div>
                        </div>
                    `;
                });

                let estiloCabeceraUrgencia = "bg-emerald-50 border-emerald-300 text-emerald-900 hover:bg-emerald-100";
                
                if (maxDiasRetraso === 1) {
                    estiloCabeceraUrgencia = "bg-amber-50 border-amber-300 text-amber-900 hover:bg-amber-100";
                } else if (maxDiasRetraso >= 2) {
                    estiloCabeceraUrgencia = "bg-red-50 border-red-300 text-red-900 hover:bg-red-100 animate-pulse";
                }

                let esColapsado = estadosColapsados[p.nombre] === true;
                let claseContenido = esColapsado ? "accordion-content collapsed" : "accordion-content";
                let claseHeader = esColapsado ? "accordion-header" : "accordion-header active";

                let cardHtml = document.createElement('div');
                cardHtml.className = "mb-2";
                cardHtml.innerHTML = `
                    <div class="${claseHeader} ${estiloCabeceraUrgencia}" onclick="conmutarAcordeonCocina('${p.nombre}')">
                        <span>🏢 DISTRIBUIDOR: <span class="font-black tracking-wide">${p.nombre}</span> <span class="ml-1 text-xs opacity-70 font-normal">(${articulosDelProveedor.length} pendientes)</span></span>
                        <span class="accordion-icon">▼</span>
                    </div>
                    <div id="acord-cocina-${p.nombre}" class="${claseContenido} bg-white border-x border-b border-slate-200 px-4 pb-2 rounded-b-xl shadow-sm">
                        <div class="divide-y divide-slate-100">${htmlArticulos}</div>
                    </div>
                `;
                container.appendChild(cardHtml);
            });
        }

        // --- ❌ FUNCIÓN EXCLUSIVA v6.4: PROCESAR ENTRADAS NO ENTREGADAS AL INSTANTE ---
        async function marcarProductoNoLlego(idxGlobal) {
            if(idxGlobal === null || idxGlobal < 0 || idxGlobal >= cestaGlobal.length) return;
            
            const item = cestaGlobal[idxGlobal];
            let productoLimpio = item.detalle.replace(/^\[.*?\]\s*/, '').trim().toUpperCase();

            // Mensaje de confirmación rápido para evitar errores accidentales en la tablet
            const confirmacion = await Swal.fire({
                title: '¿Confirmas incidencia?',
                text: `¿Quieres marcar "${productoLimpio}" de ${item.proveedor_id} como no entregado? Pasará automáticamente a la lista de faltas de la oficina.`,
                icon: 'warning',
                background: '#ffffff',
                color: '#0f172a',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#64748b',
                confirmButtonText: 'Sí, registrar falta',
                cancelButtonText: 'Volver'
            });

            if (!confirmacion.isConfirmed) return;

            // 1. Marcar el artículo como procesado en la cesta activa para sacarlo del panel
            cestaGlobal[idxGlobal].estado = "RECIBIDO";
            localStorage.setItem('fredware_cesta_compras', JSON.stringify(cestaGlobal));

            // 2. Volcar la falta en el LocalStorage
            let faltasLocales = JSON.parse(localStorage.getItem('fredware_faltas_cocina')) || [];
            faltasLocales.push(`${productoLimpio} (PROVEEDOR NO ENTREGÓ EN REPARTO)`);
            localStorage.setItem('fredware_faltas_cocina', JSON.stringify(faltasLocales));

            Swal.fire({ title: '📡 Notificando a la oficina...', background: '#ffffff', color: '#0f172a', showConfirmButton: false, allowOutsideClick: false });

            try {
                // 3. Sincronizar en bloque ambos estados directamente contra FastAPI sin pasar por el flujo de impresión
                await fetch(`${API_URL}/api/cesta`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify(cestaGlobal)
                });

                await fetch(`${API_URL}/api/faltas`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify(faltasLocales)
                });

                Swal.fire({
                    title: '🚨 INCIDENCIA REGISTRADA',
                    text: `El artículo se ha devuelto a la cesta de faltas de la oficina con éxito.`,
                    icon: 'success',
                    background: '#ffffff',
                    color: '#0f172a',
                    confirmButtonColor: '#10b981'
                });

                renderFaltasLocales();
                const proveedores = JSON.parse(localStorage.getItem('fredware_proveedores')) || [];
                renderCheckMercancia(proveedores, cestaGlobal);

            } catch (error) {
                Swal.fire({ title: '❌ ERROR', text: 'Se guardó en local, pero el PC central está desconectado.', icon: 'error', background: '#ffffff', color: '#0f172a' });
            }
        }

        function conmutarAcordeonCocina(provNombre) {
            const content = document.getElementById(`acord-cocina-${provNombre}`);
            if(!content) return;

            let estadosColapsados = JSON.parse(localStorage.getItem('fredware_cocina_acordeon_estados')) || {};
            
            if(content.classList.contains('collapsed')) {
                content.classList.remove('collapsed');
                estadosColapsados[provNombre] = false;
            } else {
                content.classList.add('collapsed');
                estadosColapsados[provNombre] = true;
            }
            
            localStorage.setItem('fredware_cocina_acordeon_estados', JSON.stringify(estadosColapsados));
            cargarDatosDeOficina();
        }

        // --- ADVERTENCIA DINÁMICA DE TEMPERATURAS ---
        function evaluarAlertaTemperatura() {
            const temp = parseFloat(document.getElementById('swal-temp').value);
            const alertaBox = document.getElementById('swal-alerta-temp');
            const modo = document.getElementById('swal-modo-conservacion').value;
            
            if (isNaN(temp)) { alertaBox.style.display = 'none'; return; }

            if (modo === "CONGELADOR") {
                if (temp > -12) {
                    alertaBox.innerHTML = "🚨 RECHAZO CRÍTICO: ¡CONGELADO FUERA DE MARGEN! (MÁX -12°C)";
                    alertaBox.className = "p-2.5 bg-red-100 text-red-700 border border-red-300 rounded-xl text-xs font-black text-center animate-pulse shadow-sm";
                    alertaBox.style.display = 'block';
                } else { alertaBox.style.display = 'none'; }
            } else if (modo === "NEVERA") {
                if (temp > 8) {
                    alertaBox.innerHTML = "⚠️ ALERTA: REFRIGERADO ALTO. VALORAR DEVOLUCIÓN (MÁX 8°C)";
                    alertaBox.className = "p-2.5 bg-amber-100 text-amber-700 border border-amber-300 rounded-xl text-xs font-black text-center shadow-sm";
                    alertaBox.style.display = 'block';
                } else { alertaBox.style.display = 'none'; }
            } else {
                if (temp > 28) {
                    alertaBox.innerHTML = "⚠️ ADVERTENCIA: AMBIENTE MUY ALTO (MÁX RECOMENDADO 25°C)";
                    alertaBox.className = "p-2.5 bg-amber-100 text-amber-700 border border-amber-300 rounded-xl text-xs font-black text-center shadow-sm";
                    alertaBox.style.display = 'block';
                } else { alertaBox.style.display = 'none'; }
            }
        }

        function cambiarTipoConservacion(tipo) {
            const btnNevera = document.getElementById('btn-cons-nevera');
            const btnConge = document.getElementById('btn-cons-conge');
            const btnSeco = document.getElementById('btn-cons-seco');
            const inputModo = document.getElementById('swal-modo-conservacion');
            const inputTemp = document.getElementById('swal-temp');

            inputModo.value = tipo;
            [btnNevera, btnConge, btnSeco].forEach(b => b.className = "py-2 rounded-xl font-bold text-xs border bg-slate-50 text-slate-500 border-slate-200 transition-all");

            if(tipo === 'CONGELADOR') {
                btnConge.className = "py-2 rounded-xl font-black text-xs bg-sky-600 text-white shadow-sm";
                inputTemp.value = -18;
            } else if(tipo === 'SECO') {
                btnSeco.className = "py-2 rounded-xl font-black text-xs bg-amber-500 text-white shadow-sm";
                inputTemp.value = 20;
            } else {
                btnNevera.className = "py-2 rounded-xl font-black text-xs bg-emerald-600 text-white shadow-sm";
                inputTemp.value = 4;
            }
            evaluarAlertaTemperatura();
        }

        // --- FLUJO POPUP DE RECEPCIÓN ---
        async function abrirFlujoRecepcion(detalleCompleto, proveedor, idxGlobal) {
            let productoLimpio = detalleCompleto.replace(/^\[.*?\]\s*/, '').trim().toUpperCase();
            
            let cantidadEsperada = 1;
            let matchCant = detalleCompleto.match(/^\[(\d+)\s*\w+\]/);
            if(matchCant) { cantidadEsperada = parseInt(matchCant[1]); }

            let conservacionInicial = "NEVERA";
            if (productoLimpio.includes("CONGELADO") || productoLimpio.includes("CONGE") || productoLimpio.includes("HELADO")) {
                conservacionInicial = "CONGELADOR";
            } else if (productoLimpio.includes("HARINA") || productoLimpio.includes("SECO") || productoLimpio.includes("ACEITE") || productoLimpio.includes("LATA") || productoLimpio.includes("BOTE")) {
                conservacionInicial = "SECO";
            }

            const { value: formValues } = await Swal.fire({
                title: `📥 Recibir: ${productoLimpio}`,
                background: '#ffffff',
                color: '#0f172a',
                confirmButtonColor: '#10b981',
                cancelButtonColor: '#64748b',
                showCancelButton: true,
                confirmButtonText: 'Procesar Entrada',
                cancelButtonText: 'Cancelar',
                html: `
                    <div class="text-left space-y-3 font-sans px-1">
                        <div id="swal-alerta-temp" style="display:none;"></div>
                        
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Tipo de Conservación Real:</label>
                            <div class="grid grid-cols-3 gap-1.5 mt-1">
                                <button type="button" id="btn-cons-nevera" onclick="cambiarTipoConservacion('NEVERA')">❄️ Nevera</button>
                                <button type="button" id="btn-cons-conge" onclick="cambiarTipoConservacion('CONGELADOR')">🥶 Conge</button>
                                <button type="button" id="btn-cons-seco" onclick="cambiarTipoConservacion('SECO')">📦 Ambiente</button>
                            </div>
                            <input id="swal-modo-conservacion" type="hidden" value="${conservacionInicial}">
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Temperatura de Entrada Real (°C):</label>
                            <input id="swal-temp" type="number" step="0.1" class="w-full bg-slate-50 text-slate-900 font-bold text-center border border-slate-300 rounded-xl py-2.5 text-lg focus:outline-none focus:border-emerald-500 shadow-inner">
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Kilos/Unidades Reales:</label>
                                <input id="swal-cantidad" type="number" min="0" step="1" value="${cantidadEsperada}" class="w-full bg-slate-50 text-slate-900 font-bold text-center border border-slate-300 rounded-xl py-2.5 text-base focus:outline-none focus:border-emerald-500 shadow-inner">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-sky-600 uppercase tracking-wider mb-1">Nº Pegatinas (Imprimir):</label>
                                <input id="swal-stickers" type="number" min="0" value="1" class="w-full bg-sky-50 text-slate-900 font-bold text-center border border-sky-300 rounded-xl py-2.5 text-base focus:outline-none focus:border-sky-500 shadow-inner">
                            </div>
                        </div>
                    </div>
                `,
                didOpen: () => { cambiarTipoConservacion(conservacionInicial); },
                preConfirm: () => {
                    return {
                        temperatura: parseFloat(document.getElementById('swal-temp').value),
                        cantidad: parseInt(document.getElementById('swal-cantidad').value) || 0,
                        stickers: parseInt(document.getElementById('swal-stickers').value) ?? 0,
                        conservacion: document.getElementById('swal-modo-conservacion').value
                    }
                }
            });

            if (!formValues) return;

            const ahora = new Date();
            const pad = (n) => n.toString().padStart(2, '0');
            const fechaString = `${pad(ahora.getDate())}/${pad(ahora.getMonth()+1)}/${ahora.getFullYear()}`;

            let huboRotura = false;
            let cantidadFaltante = 0;
            
            if(idxGlobal !== null && idxGlobal >= 0 && idxGlobal < cestaGlobal.length) {
                if(formValues.cantidad < cantidadEsperada) {
                    huboRotura = true;
                    cantidadFaltante = cantidadEsperada - formValues.cantidad;
                }
                cestaGlobal[idxGlobal].estado = "RECIBIDO";
                localStorage.setItem('fredware_cesta_compras', JSON.stringify(cestaGlobal));
            }

            let faltasLocales = JSON.parse(localStorage.getItem('fredware_faltas_cocina')) || [];
            if(huboRotura) {
                faltasLocales.push(`${productoLimpio} (FALTARON ${cantidadFaltante} UNID DEL PEDIDO)`);
                localStorage.setItem('fredware_faltas_cocina', JSON.stringify(faltasLocales));
            }

            const datosBaseDatos = {
                producto: productoLimpio,
                temperatura: formValues.temperatura,
                conservacion: formValues.conservacion,
                proveedor: proveedor,
                cantidad_total: formValues.cantidad,
                fecha_registro: ahora.toISOString()
            };

            let loteEtiquetas = [];
            if (formValues.stickers > 0) {
                for (let i = 1; i <= formValues.stickers; i++) {
                    const tagOperacion = formValues.conservacion === "CONGELADOR" ? `F.CONGELADO:${fechaString}` : `F.ENTRADA:${fechaString}`;
                    const cadenaQrUnidad = `PROD:${productoLimpio}|LOTE:${i}_DE_${formValues.stickers}|${tagOperacion}`;
                    
                    loteEtiquetas.push({
                        producto: productoLimpio,
                        unidad: formValues.conservacion === "CONGELADOR" ? `🥶 CÁMARA CONGE (${i}/${formValues.stickers})` : `${i} DE ${formValues.stickers}`,
                        fecha: formValues.conservacion === "CONGELADOR" ? `CONGELACIÓN: ${fechaString}` : `RECP: ${fechaString}`,
                        texto_qr: cadenaQrUnidad
                    });
                }
            }

            Swal.fire({ title: '📡 Sincronizando albarán...', background: '#ffffff', color: '#0f172a', showConfirmButton: false, allowOutsideClick: false });

            try {
                const resBD = await fetch(`${API_URL}/guardar_mercancia`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datosBaseDatos)
                });
                if (!resBD.ok) throw new Error("Error SQL backend");

                if (loteEtiquetas.length > 0) {
                    fetch(`${API_URL}/imprimir_lote`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ etiquetas: loteEtiquetas })
                    }).catch(e => console.log("Impresión lanzada."));
                } else {
                    console.log("Entrada sin etiquetado térmico (Valor 0 seleccionado).");
                }

                if(idxGlobal !== null) {
                    await fetch(`${API_URL}/api/cesta`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                        body: JSON.stringify(cestaGlobal)
                    });
                }

                if(huboRotura) {
                    await fetch(`${API_URL}/api/faltas`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                        body: JSON.stringify(faltasLocales)
                    });
                }

                if(huboRotura) {
                    Swal.fire({
                        title: '⚠️ ROTURA DE CAMIÓN DETECTADA',
                        text: `Procesadas ${formValues.cantidad} unidades. ¡Han faltado ${cantidadFaltante} de ${productoLimpio}! Se han devuelto a la lista de faltas automáticamente.`,
                        icon: 'warning',
                        background: '#ffffff',
                        color: '#0f172a',
                        confirmButtonColor: '#d97706'
                    });
                } else {
                    let textoNotificacion = loteEtiquetas.length > 0 
                        ? `Lote de ${loteEtiquetas.length} etiquetas enviado a la Brother.`
                        : `Albarán registrado en base de datos sin lanzar impresión física.`;

                    Swal.fire({
                        title: '✅ ¡LOGÍSTICA COMPLETA!',
                        text: textoNotificacion,
                        icon: 'success',
                        background: '#ffffff',
                        color: '#0f172a',
                        confirmButtonColor: '#10b981'
                    });
                }

                renderFaltasLocales();
                const proveedores = JSON.parse(localStorage.getItem('fredware_proveedores')) || [];
                renderCheckMercancia(proveedores, cestaGlobal);

            } catch (error) {
                Swal.fire({ title: '❌ ERROR', text: 'El PC central de la oficina está apagado.', icon: 'error', background: '#ffffff', color: '#0f172a' });
            }
        }

        // --- SISTEMA ENTRADAS DE ÚLTIMA HORA ---
        async function abrirEntradaDirecta() {
            const proveedores = JSON.parse(localStorage.getItem('fredware_proveedores')) || [];
            let optionsHtml = '<option value="S/P">PROVEEDOR GENÉRICO / COMPRA DIRECTA</option>';
            proveedores.forEach(p => { optionsHtml += `<option value="${p.nombre}">${p.nombre}</option>`; });

            const { value: directoValues } = await Swal.fire({
                title: '➕ Compra de Última Hora',
                background: '#ffffff',
                color: '#0f172a',
                confirmButtonColor: '#d97706',
                showCancelButton: true,
                confirmButtonText: 'Siguiente paso',
                cancelButtonText: 'Volver',
                html: `
                    <div class="text-left space-y-3 font-sans px-1">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Nombre de la Mercancía:</label>
                            <input id="dir-producto" type="text" placeholder="Ej: HARINA DE TRIGO..." class="w-full bg-slate-50 text-slate-900 font-bold border border-slate-300 rounded-xl py-2.5 px-3 uppercase focus:outline-none focus:border-amber-500 shadow-inner">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Origen / Distribuidor:</label>
                            <select id="dir-proveedor" class="w-full bg-slate-50 text-slate-900 border border-slate-300 rounded-xl py-2.5 px-3 focus:outline-none focus:border-amber-500 font-bold">
                                ${optionsHtml}
                            </select>
                        </div>
                    </div>
                `,
                preConfirm: () => {
                    return {
                        producto: document.getElementById('dir-producto').value.trim().toUpperCase(),
                        proveedor: document.getElementById('dir-proveedor').value
                    }
                }
            });

            if (!directoValues || !directoValues.producto) return;

            abrirFlujoRecepcion(directoValues.producto, directoValues.proveedor, null);
        }

        // DISPARADOR DE ARRANQUE SEGURO CON ANTICIPACIÓN LOCAL
        renderFaltasLocales();
        const provsCache = JSON.parse(localStorage.getItem('fredware_proveedores')) || [];
        cestaGlobal = JSON.parse(localStorage.getItem('fredware_cesta_compras')) || [];
        renderCheckMercancia(provsCache, cestaGlobal);

        cargarDatosDeOficina();
    </script>
</body>
</html>
