<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚚 Fredware - Terminal Unificada de Cocina</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        /* 🏗️ ESTILOS PARA EL ACORDEÓN DESPLEGABLE EN LA TABLET */
        .accordion-header { padding: 14px; font-size: 14px; font-weight: bold; border-radius: 12px; margin-top: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; border: 1px solid #cbd5e1; user-select: none; transition: background 0.2s, transform 0.1s; }
        .accordion-header:active { transform: scale(0.99); }
        .accordion-content { display: block; padding: 4px 0; }
        .accordion-content.collapsed { display: none; }
        .accordion-icon { font-size: 12px; transition: transform 0.2s; color: inherit; }
        .accordion-header.active .accordion-icon { transform: rotate(180deg); }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen pb-8 select-none font-sans">

    <header class="bg-white border-b border-slate-300 py-4 px-6 sticky top-0 z-50 shadow-sm">
        <div class="max-w-2xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-3xl">🚚</span>
                <div>
                    <h1 class="text-lg font-black tracking-tight text-slate-900">FREDWARE CENTRAL</h1>
                    <p class="text-xs text-emerald-600 font-bold tracking-widest uppercase">Cocina, Recepción & Congelación</p>
                </div>
            </div>
            <div class="flex items-center space-x-2">
                <span id="badge-red" class="bg-emerald-100 text-emerald-800 text-xs px-2.5 py-2 rounded-xl border border-emerald-300 font-bold">🟢 ONLINE</span>
                <button onclick="abrirEntradaDirecta()" class="bg-amber-500 hover:bg-amber-600 text-white font-black text-xs px-3 py-2 rounded-xl border border-amber-600 shadow-sm transition-all active:scale-95">
                    ➕ ENTRADA DIRECTA
                </button>
                <span class="bg-slate-200 text-slate-700 text-xs px-2.5 py-2 rounded-xl border border-slate-300 font-mono font-bold">v7.5 - Final</span>
            </div>
        </div>
    </header>

    <main class="max-w-2xl mx-auto w-full px-4 mt-6 space-y-6">
        
        <div class="bg-white border border-slate-250 rounded-2xl p-5 shadow-sm space-y-4">
            <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider flex items-center gap-2">
                <span>📝</span> Control de Faltas Diarias
            </h2>
            <div class="flex gap-2">
                <input type="text" id="insumo-falta" placeholder="Ej: MAYONESA, CEBOLLAS..." class="flex-1 bg-slate-50 border border-slate-300 rounded-xl px-4 py-3 text-slate-900 placeholder-slate-400 focus:outline-none focus:border-sky-500 uppercase text-base shadow-inner">
                <button onclick="registrarFaltaCocina()" class="bg-sky-600 hover:bg-sky-500 text-white font-bold px-5 rounded-xl shadow-sm transition-all active:scale-95">
                    ➕ Añadir
                </button>
            </div>
            <div id="contenedor-faltas-local" class="space-y-2 pt-2 max-h-40 overflow-y-auto"></div>
        </div>

        <div class="bg-white border border-slate-250 rounded-2xl p-5 shadow-sm space-y-4">
            <h2 class="text-sm font-bold text-emerald-600 uppercase tracking-wider flex items-center gap-2">
                <span>🚛</span> Entradas Esperadas Hoy (Check & Trazabilidad)
            </h2>
            <div id="visor-repartos-hoy" class="space-y-4"></div>
        </div>
    </main>

    <script>
        const API_URL = "https://untried-january-thinning.ngrok-free.dev";
        let cestaGlobal = [];

        // ✅ FIX APPCC: Alineada la temperatura de Seco a 25°C tanto en margen como en string de alerta
        const CONFIG_APPCC = {
            CONGELADOR: { min: -30, max: -12, defecto: -18, alerta: "🚨 RECHAZO CRÍTICO: ¡CONGELADO FUERA DE MARGEN! (MÁX -12°C)" },
            NEVERA:     { min: 0,   max: 8,   defecto: 4,   alerta: "⚠️ ALERTA: REFRIGERADO ALTO. VALORAR DEVOLUCIÓN (MÁX 8°C)" },
            SECO:       { min: 5,   max: 25,  defecto: 20,  alerta: "⚠️ ADVERTENCIA: AMBIENTE MUY ALTO (MÁX RECOMENDADO 25°C)" }
        };

        function actualizarEstadoRed(online) {
            const badge = document.getElementById('badge-red');
            if (!badge) return;
            if (online) {
                badge.innerHTML = "🟢 ONLINE";
                badge.className = "bg-emerald-100 text-emerald-800 text-xs px-2.5 py-2 rounded-xl border border-emerald-300 font-bold";
            } else {
                badge.innerHTML = "📡 OFFLINE";
                badge.className = "bg-amber-500 text-white text-xs px-2.5 py-2 rounded-xl border border-amber-600 font-black animate-pulse shadow-sm";
            }
        }

        async function sincronizarConOficina(endpoint, datos) {
            try {
                await fetch(`${API_URL}/api/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                    body: JSON.stringify(datos)
                });
                actualizarEstadoRed(true);
            } catch (error) { 
                console.error("Error pasivo en red local:", error); 
                actualizarEstadoRed(false);
            }
        }

        async function cargarDatosDeOficina() {
            try {
                const respuesta = await fetch(`${API_URL}/api/datos`, { headers: { 'ngrok-skip-browser-warning': 'true' } });
                if (!respuesta.ok) throw new Error("Gateway Error");
                const db = await respuesta.json();
                
                // ✅ FIX 5: Verificación estricta anti-borrados por arrays vacíos o nulos del server
                if (Array.isArray(db.cesta) && db.cesta.length > 0) {
                    let cestaLocal = JSON.parse(localStorage.getItem('fredware_cesta_compras')) || [];
                    const cestaServidor = db.cesta;
                    
                    cestaServidor.forEach(item => {
                        if (!item.id) item.id = "ID_" + Math.random().toString(36).substring(2, 9) + "_" + Date.now();
                    });

                    const cestaCombinada = [...cestaServidor];
                    cestaLocal.forEach(itemLocal => {
                        if (itemLocal.estado === "RECIBIDO" || itemLocal.estado === "AUSENTE") {
                            if (!cestaServidor.some(s => s.id === itemLocal.id || s.detalle === itemLocal.detalle)) {
                                cestaCombinada.push(itemLocal);
                            }
                        }
                    });

                    cestaGlobal = cestaCombinada;
                    localStorage.setItem('fredware_cesta_compras', JSON.stringify(cestaCombinada));
                }
                
                if (db.faltas && Array.isArray(db.faltas)) localStorage.setItem('fredware_faltas_cocina', JSON.stringify(db.faltas));
                if (db.proveedores && Array.isArray(db.proveedores)) localStorage.setItem('fredware_proveedores', JSON.stringify(db.proveedores));
                
                renderFaltasLocales();
                renderCheckMercancia(cestaGlobal);
                actualizarEstadoRed(true);
            } catch (error) {
                actualizarEstadoRed(false);
                renderFaltasLocales();
                cestaGlobal = JSON.parse(localStorage.getItem('fredware_cesta_compras')) || [];
                renderCheckMercancia(cestaGlobal);
            }
        }

        function registrarFaltaCocina() {
            const input = document.getElementById('insumo-falta');
            const valor = input.value.trim().toUpperCase();
            if(!valor) return;

            if(valor.length < 3) {
                Swal.fire({ icon: 'warning', title: 'Texto muy corto', text: 'Escribe al menos 3 letras para registrar la falta.', background: '#ffffff', color: '#000' });
                return;
            }

            let faltas = JSON.parse(localStorage.getItem('fredware_faltas_cocina')) || [];
            if(faltas.includes(valor)) {
                Swal.fire({ icon: 'info', title: 'Ya registrado', text: 'Este insumo ya está anotado en la lista.', background: '#ffffff', color: '#000' });
                return;
            }

            faltas.push(valor);
            localStorage.setItem('fredware_faltas_cocina', JSON.stringify(faltas));
            sincronizarConOficina('faltas', faltas);
            input.value = '';
            renderFaltasLocales();
        }

        function renderFaltasLocales() {
            const faltas = JSON.parse(localStorage.getItem('fredware_faltas_cocina')) || [];
            const container = document.getElementById('contenedor-faltas-local');
            if(!container) return;
            container.innerHTML = '';
            if(faltas.length === 0) {
                container.innerHTML = `<div class="text-center italic text-slate-400 text-xs py-2">No hay faltas apuntadas hoy.</div>`;
                return;
            }
            faltas.forEach((item, idx) => {
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-50 border border-slate-200 px-4 py-2.5 rounded-xl shadow-sm">
                        <span class="text-sm font-bold text-amber-600">⚠️ ${item}</span>
                        <button onclick="borrarFaltaLocal(${idx})" class="text-xs bg-red-50 text-red-600 border border-red-200 px-2.5 py-1 rounded-lg font-bold hover:bg-red-600 hover:text-white transition-colors">Eliminar</button>
                    </div>
                `;
            });
        }

        function borrarFaltaLocal(idx) {
            let faltas = JSON.parse(localStorage.getItem('fredware_faltas_cocina')) || [];
            if (idx >= 0 && idx < faltas.length) {
                faltas.splice(idx, 1);
                localStorage.setItem('fredware_faltas_cocina', JSON.stringify(faltas));
                sincronizarConOficina('faltas', faltas);
            }
            renderFaltasLocales();
        }

        // --- 📊 RENDERIZADO CON ACORDEÓN SANITIZADO ---
        function renderCheckMercancia(cesta) {
            const container = document.getElementById('visor-repartos-hoy');
            if(!container) return; container.innerHTML = '';

            if(!cesta || !Array.isArray(cesta) || cesta.length === 0) {
                container.innerHTML = `<div class="italic text-slate-400 text-sm text-center py-4">La cesta central está vacía.</div>`;
                return;
            }

            const estadosColapsados = JSON.parse(localStorage.getItem('fredware_cocina_acordeon_estados')) || {};
            const ahora = new Date();

            let gruposCesta = {};
            cesta.forEach(item => {
                if(item.estado === "PENDIENTE" || item.estado === "PREPARADO") {
                    let prov = (item.proveedor_id || "S/P").trim().toUpperCase();
                    if(!gruposCesta[prov]) gruposCesta[prov] = [];
                    gruposCesta[prov].push(item);
                }
            });

            let deClaves = Object.keys(gruposCesta);
            if(deClaves.length === 0) {
                container.innerHTML = `<div class="italic text-slate-400 text-sm text-center py-4">No quedan artículos pendientes.</div>`;
                return;
            }

            deClaves.sort().forEach(provNombre => {
                let articulosDelProveedor = gruposCesta[provNombre];
                let maxDiasRetraso = 0;
                let htmlArticulos = '';
                
                articulosDelProveedor.forEach(item => {
                    let uId = item.id || "FALLBACK";
                    if (item.fecha_registro) {
                        let fechaRegistro = new Date(item.fecha_registro);
                        let diferenciaTiempo = ahora - fechaRegistro;
                        let diasDiferencia = Math.floor(diferenciaTiempo / (1000 * 60 * 60 * 24));
                        if (diasDiferencia > maxDiasRetraso) maxDiasRetraso = diasDiferencia;
                    }

                    htmlArticulos += `
                        <div class="flex justify-between items-center py-3 border-b border-slate-100 last:border-none">
                            <span class="text-sm font-semibold text-slate-700">📦 ${item.detalle}</span>
                            <div class="flex space-x-2">
                                <button onclick="marcarProductoNoLlego('${uId}')" class="bg-slate-200 hover:bg-red-200 text-slate-700 hover:text-red-700 text-xs font-bold px-2.5 py-2 rounded-xl transition-all active:scale-95 shadow-sm border border-slate-300">
                                    ❌ No llegó
                                </button>
                                <button onclick="abrirFlujoRecepcion('${item.detalle.replace(/'/g, "\\'")}', '${provNombre}', '${uId}')" class="bg-emerald-600 hover:bg-emerald-500 text-white text-xs font-black px-3 py-2 rounded-xl transition-all active:scale-95 shadow-sm">
                                    📥 Recibir
                                </button>
                            </div>
                        </div>
                    `;
                });

                let estiloCabeceraUrgencia = "bg-emerald-50 border-emerald-300 text-emerald-900 hover:bg-emerald-100";
                if (maxDiasRetraso === 1) estiloCabeceraUrgencia = "bg-amber-50 border-amber-300 text-amber-900 hover:bg-amber-100";
                else if (maxDiasRetraso >= 2) estiloCabeceraUrgencia = "bg-red-50 border-red-300 text-red-900 hover:bg-red-100 animate-pulse";

                let esColapsado = estadosColapsados[provNombre] === true;
                const safeId = provNombre.replace(/[^a-z0-9]/gi, '_'); // ✅ FIX 14: Sanitización de caracteres en ID del DOM

                let cardHtml = document.createElement('div');
                cardHtml.className = "mb-2";
                cardHtml.innerHTML = `
                    <div class="accordion-header ${esColapsado ? '' : 'active'} ${estiloCabeceraUrgencia}" onclick="conmutarAcordeonCocina('${provNombre}')">
                        <span>🏢 DISTRIBUIDOR: <span class="font-black tracking-wide">${provNombre}</span> <span class="ml-1 text-xs opacity-70 font-normal">(${articulosDelProveedor.length} pendientes)</span></span>
                        <div class="flex items-center space-x-2" onclick="event.stopPropagation();">
                            <button onclick="recibirTodoElProveedor('${provNombre}')" class="bg-sky-600 hover:bg-sky-500 text-white text-[10px] font-black px-2.5 py-1.5 rounded-lg shadow-sm border border-sky-700 transition-all active:scale-95">⚡ RECIBIR TODO</button>
                            <span class="accordion-icon ml-2">▼</span>
                        </div>
                    </div>
                    <div id="acord-cocina-${safeId}" class="accordion-content ${esColapsado ? 'collapsed' : ''} bg-white border-x border-b border-slate-200 px-4 pb-2 rounded-b-xl shadow-sm">
                        <div class="divide-y divide-slate-100">${htmlArticulos}</div>
                    </div>
                `;
                container.appendChild(cardHtml);
            });
        }

        // --- 🚀 ACCIÓN REVOLUCIONARIA: RECEPCIÓN TOTAL EXTRARÁPIDA DE UN CAMIÓN ---
        async function recibirTodoElProveedor(provNombre) {
            let bultosPendientes = cestaGlobal.filter(item => (item.proveedor_id || "S/P").trim().toUpperCase() === provNombre.trim().toUpperCase() && (item.estado === "PENDIENTE" || item.estado === "PREPARADO"));
            if(bultosPendientes.length === 0) return;

            // Pedimos una sola vez la temperatura para rellenar todo el bloque APPCC
            const { value: tempMasiva } = await Swal.fire({
                title: `⚡ Recepción Rápida: ${provNombre}`,
                text: `Introduce la temperatura general del camión de reparto (°C) para procesar las ${bultosPendientes.length} líneas de golpe:`,
                input: 'number',
                inputAttributes: { step: '0.1' },
                inputValue: 4.0,
                showCancelButton: true,
                confirmButtonColor: '#10b981',
                confirmButtonText: 'Validar y Firmar Todo',
                cancelButtonText: 'Cancelar'
            });

            if (tempMasiva === undefined || tempMasiva === "") return;
            const tFloat = parseFloat(tempMasiva);

            // Doble escudo higiénico APPCC masivo
            if(tFloat > 8.0) {
                const confCritica = await Swal.fire({
                    title: '🚨 ADVERTENCIA TÉRMICA',
                    text: `La temperatura de ${tFloat}°C supera el límite de refrigeración de seguridad. ¿Confirmas la entrada del camión completo bajo tu riesgo?`,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#d33',
                    confirmButtonText: 'Sí, autorizar descarga masiva',
                    cancelButtonText: 'Rechazar camión'
                });
                if(!confCritica.isConfirmed) return;
            }

            Swal.fire({ title: '📡 Procesando lote completo...', background: '#ffffff', showConfirmButton: false, allowOutsideClick: false });

            const ahora = new Date();
            const pad = (n) => n.toString().padStart(2, '0');
            const fechaString = `${pad(ahora.getDate())}/${pad(ahora.getMonth()+1)}/${ahora.getFullYear()}`;

            // Recorremos y liquidamos todas las líneas en background de una sola pasada
            for (let item of bultosPendientes) {
                let idx = cestaGlobal.findIndex(c => c.id === item.id);
                if (idx !== -1) cestaGlobal[idx].estado = "RECIBIDO";

                let productoLimpio = item.detalle.replace(/^\[.*?\]\s*/, '').trim().toUpperCase();

                const datosBaseDatos = {
                    producto: productoLimpio,
                    temperatura: tFloat,
                    conservacion: "NEVERA",
                    proveedor: provNombre,
                    cantidad_total: 1,
                    fecha_registro: ahora.toISOString()
                };

                // Guardamos en SQL de fondo
                await fetch(`${API_URL}/guardar_mercancia`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(datosBaseDatos) });
                
                // Escupimos 1 etiqueta Brother por cada bulto del camión de forma automática
                let etiquetaUnica = [{
                    producto: productoLimpio,
                    unidad: `1 DE 1`,
                    fecha: `RECP: ${fechaString}`,
                    texto_qr: `PROD:${productoLimpio}|LOTE:MASIVO|F.ENTRADA:${fechaString}`
                }];

                fetch(`${API_URL}/imprimir_lote`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ etiquetas: etiquetaUnica }) }).catch(() => {});
            }

            localStorage.setItem('fredware_cesta_compras', JSON.stringify(cestaGlobal));

            // Sincronización atómica masiva al terminar el bucle
            await fetch(`${API_URL}/api/cesta`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' }, body: JSON.stringify(cestaGlobal) });

            Swal.fire({ icon: 'success', title: '🚚 ENTRADA COMPLETADA', text: `Se han procesado las ${bultosPendientes.length} líneas de ${provNombre} y enviado los stickers al rodillo Brother.`, confirmButtonColor: '#10b981' });

            renderCheckMercancia(cestaGlobal);
        }

        async function marcarProductoNoLlego(uIdUnique) {
            let idxGlobal = cestaGlobal.findIndex(c => c.id === uIdUnique);
            if(idxGlobal === -1) return;
            
            const item = cestaGlobal[idxGlobal];
            let productoLimpio = item.detalle.replace(/^\[.*?\]\s*/, '').trim().toUpperCase();

            const confirmacion = await Swal.fire({
                title: '¿Confirmas incidencia?',
                text: `¿Quieres marcar "${productoLimpio}" como no entregado? Rebotará automáticamente a la lista de compras de la oficina.`,
                icon: 'warning',
                background: '#ffffff',
                color: '#0f172a',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                confirmButtonText: 'Sí, registrar incidencia',
                cancelButtonText: 'Volver'
            });

            if (!confirmacion.isConfirmed) return;

            // ✅ FIX 2: Cambiado el estado a "AUSENTE" para no falsear las analíticas de stock
            cestaGlobal[idxGlobal].estado = "AUSENTE";
            localStorage.setItem('fredware_cesta_compras', JSON.stringify(cestaGlobal));

            let faltasLocales = JSON.parse(localStorage.getItem('fredware_faltas_cocina')) || [];
            faltasLocales.push(`${productoLimpio} (PROVEEDOR NO ENTREGÓ EN REPARTO)`);
            localStorage.setItem('fredware_faltas_cocina', JSON.stringify(faltasLocales));

            Swal.fire({ title: '📡 Notificando a la oficina...', background: '#ffffff', showConfirmButton: false, allowOutsideClick: false });

            try {
                await fetch(`${API_URL}/api/cesta`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' }, body: JSON.stringify(cestaGlobal) });
                await fetch(`${API_URL}/api/faltas`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' }, body: JSON.stringify(faltasLocales) });

                Swal.fire({ title: '🚨 INCIDENCIA REGISTRADA', text: `Enviado con éxito a la central.`, icon: 'success', background: '#ffffff', color: '#0f172a', confirmButtonColor: '#10b981' });
                renderFaltasLocales();
                renderCheckMercancia(cestaGlobal);
            } catch (error) {
                Swal.fire({ title: '❌ ERROR DE RED', text: 'Guardado en local. No se pudo conectar con el PC central.', icon: 'error', background: '#ffffff', color: '#0f172a' });
            }
        }

        // 🎯 FIX 7: Conmutación nativa de clases del acordeón sin destruir/reconstruir el DOM
        function conmutarAcordeonCocina(provNombre) {
            const safeId = provNombre.replace(/[^a-z0-9]/gi, '_');
            const content = document.getElementById(`acord-cocina-${safeId}`);
            if(!content) return;

            let estadosColapsados = JSON.parse(localStorage.getItem('fredware_cocina_acordeon_estados')) || {};
            
            if(content.classList.contains('collapsed')) {
                content.classList.remove('collapsed');
                estadosColapsados[provNombre] = false;
                content.previousElementSibling.classList.add('active');
            } else {
                content.classList.add('collapsed');
                estadosColapsados[provNombre] = true;
                content.previousElementSibling.classList.remove('active');
            }
            localStorage.setItem('fredware_cocina_acordeon_estados', JSON.stringify(estadosColapsados));
        }

        function evaluarAlertaTemperatura() {
            const temp = parseFloat(document.getElementById('swal-temp').value);
            const alertaBox = document.getElementById('swal-alerta-temp');
            const modo = document.getElementById('swal-modo-conservacion').value;
            
            if (isNaN(temp)) { alertaBox.style.display = 'none'; return; }
            const limites = CONFIG_APPCC[modo];

            if (temp > limites.max) {
                alertaBox.innerHTML = limites.alerta;
                alertaBox.className = "p-2.5 bg-red-100 text-red-700 border border-red-300 rounded-xl text-xs font-black text-center animate-pulse shadow-sm";
                alertaBox.style.display = 'block';
            } else {
                alertaBox.style.display = 'none';
            }
        }

        function cambiarTipoConservacion(tipo) {
            const btnNevera = document.getElementById('btn-cons-nevera');
            const btnConge = document.getElementById('btn-cons-conge');
            const btnSeco = document.getElementById('btn-cons-seco');
            const inputModo = document.getElementById('swal-modo-conservacion');
            const inputTemp = document.getElementById('swal-temp');

            inputModo.value = tipo;
            [btnNevera, btnConge, btnSeco].forEach(b => b.className = "py-2 rounded-xl font-bold text-xs border bg-slate-50 text-slate-500 border-slate-200 transition-all");

            if(tipo === 'CONGELADOR') {
                btnConge.className = "py-2 rounded-xl font-black text-xs bg-sky-600 text-white shadow-sm";
                inputTemp.value = CONFIG_APPCC.CONGELADOR.defecto;
            } else if(tipo === 'SECO') {
                btnSeco.className = "py-2 rounded-xl font-black text-xs bg-amber-500 text-white shadow-sm";
                inputTemp.value = CONFIG_APPCC.SECO.defecto;
            } else {
                btnNevera.className = "py-2 rounded-xl font-black text-xs bg-emerald-600 text-white shadow-sm";
                inputTemp.value = CONFIG_APPCC.NEVERA.defecto;
            }
            evaluarAlertaTemperatura();
        }

        async function abrirFlujoRecepcion(detalleCompleto, proveedor, uIdUnique) {
            let idxGlobal = cestaGlobal.findIndex(c => c.id === uIdUnique);
            let productoLimpio = detalleCompleto.replace(/^\[.*?\]\s*/, '').trim().toUpperCase();
            let cantidadEsperada = 1;
            let matchCant = detalleCompleto.match(/^\[(\d+)\s*\w+\]/);
            if(matchCant) { cantidadEsperada = parseInt(matchCant[1]); }

            let conservacionInicial = "NEVERA";
            if (productoLimpio.includes("CONGELADO") || productoLimpio.includes("CONGE") || productoLimpio.includes("HELADO")) {
                conservacionInicial = "CONGELADOR";
            } else if (productoLimpio.includes("HARINA") || productoLimpio.includes("SECO") || productoLimpio.includes("ACEITE") || productoLimpio.includes("LATA") || productoLimpio.includes("BOTE")) {
                conservacionInicial = "SECO";
            }

            const { value: formValues } = await Swal.fire({
                title: `📥 Recibir: ${productoLimpio}`,
                background: '#ffffff', color: '#0f172a', confirmButtonColor: '#10b981', cancelButtonColor: '#64748b', showCancelButton: true, confirmButtonText: 'Procesar Entrada', cancelButtonText: 'Cancelar',
                html: `
                    <div class="text-left space-y-3 font-sans px-1">
                        <div id="swal-alerta-temp" style="display:none;"></div>
                        
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Tipo de Conservación:</label>
                            <div class="grid grid-cols-3 gap-1.5 mt-1">
                                <button type="button" id="btn-cons-nevera" onclick="cambiarTipoConservacion('NEVERA')">❄️ Nevera</button>
                                <button type="button" id="btn-cons-conge" onclick="cambiarTipoConservacion('CONGELADOR')">🥶 Conge</button>
                                <button type="button" id="btn-cons-seco" onclick="cambiarTipoConservacion('SECO')">📦 Ambiente</button>
                            </div>
                            <input id="swal-modo-conservacion" type="hidden" value="${conservacionInicial}">
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Temperatura Real (°C):</label>
                            <input id="swal-temp" type="number" step="0.1" oninput="evaluarAlertaTemperatura()" class="w-full bg-slate-50 text-slate-900 font-bold text-center border border-slate-300 rounded-xl py-2.5 text-lg shadow-inner">
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Kilos/Unidades Reales:</label>
                                <input id="swal-cantidad" type="number" min="1" step="1" value="${cantidadEsperada}" class="w-full bg-slate-50 text-slate-900 font-bold text-center border border-slate-300 rounded-xl py-2.5 text-base shadow-inner">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-sky-600 uppercase tracking-wider mb-1">Nº Pegatinas (Brother):</label>
                                <input id="swal-stickers" type="number" min="0" value="1" class="w-full bg-sky-50 text-slate-900 font-bold text-center border border-sky-300 rounded-xl py-2.5 text-base shadow-inner">
                            </div>
                        </div>
                    </div>
                `,
                didOpen: () => { cambiarTipoConservacion(conservacionInicial); },
                preConfirm: () => {
                    const cantReal = parseInt(document.getElementById('swal-cantidad').value) || 0;
                    if(cantReal <= 0) {
                        Swal.showValidationMessage('⚠️ Error: La cantidad ingresada debe ser mayor que cero.');
                        return false;
                    }
                    return {
                        temperatura: parseFloat(document.getElementById('swal-temp').value),
                        cantidad: cantReal,
                        stickers: parseInt(document.getElementById('swal-stickers').value) || 0,
                        conservacion: document.getElementById('swal-modo-conservacion').value
                    }
                }
            });

            if (!formValues) return;

            // 🎯 FIX 8: Doble confirmación obligatoria APPCC si saltó la alerta térmica crítica
            const limitesRef = CONFIG_APPCC[formValues.conservacion];
            if (formValues.temperatura > limitesRef.max) {
                const confirmacionCritica = await Swal.fire({
                    title: '🚨 ADVERTENCIA APPCC',
                    text: `La mercancía está fuera de rango térmico para ${formValues.conservacion}. ¿Confirmas la entrada bajo supervisión de cocina?`,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#d33',
                    confirmButtonText: 'Sí, autorizar entrada',
                    cancelButtonText: 'Rechazar bulto'
                });
                if (!confirmacionCritica.isConfirmed) return;
            }

            const ahora = new Date();
            const pad = (n) => n.toString().padStart(2, '0');
            const fechaString = `${pad(ahora.getDate())}/${pad(ahora.getMonth()+1)}/${ahora.getFullYear()}`;

            let huboRotura = false;
            let cantidadFaltante = 0;
            
            if(idxGlobal !== -1) {
                if(formValues.cantidad < cantidadEsperada) {
                    huboRotura = true;
                    cantidadFaltante = cantidadEsperada - formValues.cantidad;
                }
                cestaGlobal[idxGlobal].estado = "RECIBIDO";
                localStorage.setItem('fredware_cesta_compras', JSON.stringify(cestaGlobal));
            }

            let faltasLocales = JSON.parse(localStorage.getItem('fredware_faltas_cocina')) || [];
            if(huboRotura) {
                faltasLocales.push(`${productoLimpio} (FALTARON ${cantidadFaltante} UNID DEL PEDIDO)`);
                localStorage.setItem('fredware_faltas_cocina', JSON.stringify(faltasLocales));
            }

            const datosBaseDatos = {
                producto: productoLimpio,
                temperatura: formValues.temperatura,
                conservacion: formValues.conservacion,
                proveedor: proveedor,
                cantidad_total: formValues.cantidad,
                fecha_registro: ahora.toISOString()
            };

            let loteEtiquetas = [];
            if (formValues.stickers > 0) {
                for (let i = 1; i <= formValues.stickers; i++) {
                    const tagOperacion = formValues.conservacion === "CONGELADOR" ? `F.CONGELADO:${fechaString}` : `F.ENTRADA:${fechaString}`;
                    loteEtiquetas.push({
                        producto: productoLimpio,
                        unidad: formValues.conservacion === "CONGELADOR" ? `🥶 CÁMARA CONGE (${i}/${formValues.stickers})` : `${i} DE ${formValues.stickers}`,
                        fecha: formValues.conservacion === "CONGELADOR" ? `CONGELACIÓN: ${fechaString}` : `RECP: ${fechaString}`,
                        texto_qr: `PROD:${productoLimpio}|LOTE:${i}_DE_${formValues.stickers}|${tagOperacion}`
                    });
                }
            }

            Swal.fire({ title: '📡 Sincronizando albarán...', background: '#ffffff', showConfirmButton: false, allowOutsideClick: false });

            try {
                const resBD = await fetch(`${API_URL}/guardar_mercancia`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(datosBaseDatos) });
                if (!resBD.ok) throw new Error("Error en grabación SQL.");

                // ✅ FIX 6: El rodillo Brother solo dispara la orden si la base de datos confirmó el OK primero
                if (loteEtiquetas.length > 0) {
                    try {
                        await fetch(`${API_URL}/imprimir_lote`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ etiquetas: loteEtiquetas }) });
                    } catch (e) {
                        alert("⚠️ Advertencia: El albarán se guardó, pero la etiquetadora Brother no responde.");
                    }
                }

                await fetch(`${API_URL}/api/cesta`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' }, body: JSON.stringify(cestaGlobal) });

                if(huboRotura) {
                    await fetch(`${API_URL}/api/faltas`, { method: 'POST', headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' }, body: JSON.stringify(faltasLocales) });
                }

                Swal.fire({
                    title: huboRotura ? '⚠️ ROTURA DE STOCK REGISTRADA' : '✅ ¡LOGÍSTICA COMPLETA!',
                    text: huboRotura ? `¡Faltaron ${cantidadFaltante} bultos! Rebotado a la central.` : `Albarán anotado y etiquetas enviadas de forma segura.`,
                    icon: huboRotura ? 'warning' : 'success',
                    background: '#ffffff', color: '#0f172a', confirmButtonColor: '#10b981'
                });

                renderFaltasLocales();
                renderCheckMercancia(cestaGlobal);

            } catch (error) {
                Swal.fire({ title: '❌ ERROR DE RED', text: 'El PC central de la oficina está apagado.', icon: 'error', background: '#ffffff', color: '#0f172a' });
            }
        }

        async function abrirEntradaDirecta() {
            const proveedores = JSON.parse(localStorage.getItem('fredware_proveedores')) || [];
            let optionsHtml = '<option value="S/P">PROVEEDOR GENÉRICO / COMPRA DIRECTA</option>';
            proveedores.forEach(p => { optionsHtml += `<option value="${p.nombre}">${p.nombre}</option>`; });

            const { value: directoValues } = await Swal.fire({
                title: '➕ Compra de Última Hora',
                background: '#ffffff', color: '#0f172a', confirmButtonColor: '#d97706', showCancelButton: true, confirmButtonText: 'Siguiente paso', cancelButtonText: 'Volver',
                html: `
                    <div class="text-left space-y-3 font-sans px-1">
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Nombre de la Mercancía:</label>
                            <input id="dir-producto" type="text" placeholder="Ej: HARINA DE TRIGO..." class="w-full bg-slate-50 text-slate-900 font-bold border border-slate-300 rounded-xl py-2.5 px-3 uppercase focus:outline-none focus:border-amber-500 shadow-inner">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1">Origen / Distribuidor:</label>
                            <select id="dir-proveedor" class="w-full bg-slate-50 text-slate-900 border border-slate-300 rounded-xl py-2.5 px-3 focus:outline-none focus:border-amber-500 font-bold">
                                ${optionsHtml}
                            </select>
                        </div>
                    </div>
                `,
                preConfirm: () => {
                    return {
                        producto: document.getElementById('dir-producto').value.trim().toUpperCase(),
                        proveedor: document.getElementById('dir-proveedor').value
                    }
                }
            });

            if (!directoValues || !directoValues.producto) return;
            const tempId = "DIR_" + Math.random().toString(36).substring(2, 7) + "_" + Date.now();
            abrirFlujoRecepcion(directoValues.producto, directoValues.proveedor, tempId);
        }

        renderFaltasLocales();
        cestaGlobal = JSON.parse(localStorage.getItem('fredware_cesta_compras')) || [];
        renderCheckMercancia(cestaGlobal);

        cargarDatosDeOficina();
        setInterval(cargarDatosDeOficina, 25000); 
    </script>
</body>
</html>
