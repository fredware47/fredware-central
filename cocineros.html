<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Registro Horas Extras - Cocineros</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
        }
        body {
            background: #f1f5f9;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        h1 {
            color: #0f172a;
            font-size: 1.8rem;
            border-bottom: 4px solid #3b82f6;
            padding-bottom: 8px;
            margin-bottom: 16px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #334155;
        }
        input,
        select,
        textarea {
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 0.95rem;
            width: 100%;
            background: white;
        }
        input:focus,
        select:focus,
        textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            outline: none;
        }
        textarea {
            resize: vertical;
            min-height: 56px;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            background: #3b82f6;
            color: white;
            width: 100%;
            transition: 0.2s;
        }
        .btn:hover {
            background: #2563eb;
            transform: scale(1.02);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .mensaje {
            margin-top: 12px;
            padding: 10px;
            border-radius: 10px;
            display: none;
        }
        .mensaje.exito {
            background: #dcfce7;
            color: #166534;
            display: block;
        }
        .mensaje.error {
            background: #fee2e2;
            color: #991b1b;
            display: block;
        }
        .foto-preview {
            max-width: 100%;
            margin-top: 8px;
            border-radius: 12px;
            display: none;
            max-height: 200px;
            object-fit: cover;
        }
        .info {
            margin-top: 16px;
            font-size: 0.8rem;
            color: #94a3b8;
            text-align: center;
        }
        .cargando {
            color: #64748b;
            font-size: 0.9rem;
            padding: 8px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧑‍🍳 Registrar Horas Extra</h1>
        <form id="formRegistro">
            <div class="form-group">
                <label>👤 Nombre</label>
                <select id="nombreCocinero" required>
                    <option value="">Cargando nombres...</option>
                </select>
            </div>
            <div class="form-group">
                <label>📅 Fecha</label>
                <input type="date" id="fecha" required>
            </div>
            <div class="form-group">
                <label>⏰ Hora de inicio</label>
                <input type="time" id="horaInicio" required>
            </div>
            <div class="form-group">
                <label>⏰ Hora de fin</label>
                <input type="time" id="horaFin" required>
            </div>
            <div class="form-group">
                <label>📸 Foto (evidencia)</label>
                <input type="file" id="foto" accept="image/*" capture="environment">
                <img id="fotoPreview" class="foto-preview" alt="Vista previa">
                <small style="color:#94a3b8; font-size:0.75rem;">Toca para hacer la foto</small>
            </div>
            <div class="form-group">
                <label>💬 Comentarios (opcional)</label>
                <textarea id="comentarios" placeholder="Ej: Reposición, limpieza extra..."></textarea>
            </div>
            <button type="submit" class="btn">➕ Guardar registro</button>
        </form>
        <div id="mensaje" class="mensaje"></div>
        <div class="info">Los datos se guardan en la nube de forma segura.</div>
    </div>

    <script>
        // ------------------------------------------------------------
        // CONFIGURACIÓN DE SUPABASE
        // ------------------------------------------------------------
        const SUPABASE_URL = 'https://bhyprsjokwgazzzlfnbf.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_i-g5o4tO1R8u6Fe7Fc2Q8Q_V_FV271y';

        console.log('🔍 Conectando a Supabase...');
        console.log('URL:', SUPABASE_URL);

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ------------------------------------------------------------
        // LISTA DE NOMBRES POR DEFECTO (por si la tabla está vacía)
        // ------------------------------------------------------------
        const NOMBRES_POR_DEFECTO = [
            'Antonio', 'Remedios', 'Rafael', 'Andrea', 'Ines',
            'Ignacio', 'Leticia', 'Cristian', 'Daniel', 'Francisco'
        ];

        // ------------------------------------------------------------
        // FUNCIONES
        // ------------------------------------------------------------

        // Cargar lista de personal desde la base de datos
        async function cargarPersonal() {
            const select = document.getElementById('nombreCocinero');
            try {
                console.log('📥 Cargando lista de personal...');
                const { data, error } = await supabase
                    .from('horas_personal')
                    .select('nombre')
                    .order('nombre');

                if (error) {
                    console.error('❌ Error al cargar personal:', error);
                    // Si hay error, usar nombres por defecto
                    usarNombresPorDefecto();
                    mostrarMensaje('Usando lista de nombres local', 'error');
                    return;
                }

                console.log('✅ Personal cargado:', data);

                // Si no hay datos en la tabla, insertar los nombres por defecto
                if (!data || data.length === 0) {
                    console.log('📝 Tabla vacía, insertando nombres por defecto...');
                    await insertarNombresPorDefecto();
                    // Recargar después de insertar
                    const { data: newData } = await supabase
                        .from('horas_personal')
                        .select('nombre')
                        .order('nombre');
                    if (newData && newData.length > 0) {
                        renderizarSelect(newData);
                    } else {
                        usarNombresPorDefecto();
                    }
                    return;
                }

                renderizarSelect(data);

            } catch (error) {
                console.error('❌ Error en cargarPersonal:', error);
                usarNombresPorDefecto();
                mostrarMensaje('Error de conexión. Usando lista local.', 'error');
            }
        }

        // Insertar nombres por defecto en la base de datos
        async function insertarNombresPorDefecto() {
            try {
                const inserts = NOMBRES_POR_DEFECTO.map(nombre => ({ nombre }));
                const { error } = await supabase
                    .from('horas_personal')
                    .insert(inserts);
                if (error) {
                    console.error('❌ Error al insertar nombres:', error);
                    return;
                }
                console.log('✅ Nombres insertados correctamente');
            } catch (error) {
                console.error('❌ Error en insertarNombresPorDefecto:', error);
            }
        }

        // Usar nombres por defecto localmente (sin base de datos)
        function usarNombresPorDefecto() {
            const select = document.getElementById('nombreCocinero');
            select.innerHTML = '<option value="">-- Seleccionar --</option>';
            NOMBRES_POR_DEFECTO.forEach(nombre => {
                const opt = document.createElement('option');
                opt.value = nombre;
                opt.textContent = nombre;
                select.appendChild(opt);
            });
        }

        // Renderizar el select con los datos
        function renderizarSelect(data) {
            const select = document.getElementById('nombreCocinero');
            select.innerHTML = '<option value="">-- Seleccionar --</option>';
            if (data && data.length > 0) {
                data.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.nombre;
                    opt.textContent = item.nombre;
                    select.appendChild(opt);
                });
            } else {
                select.innerHTML = '<option value="">No hay nombres registrados</option>';
            }
        }

        // Previsualización de foto
        document.getElementById('foto').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const preview = document.getElementById('fotoPreview');
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    preview.src = ev.target.result;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else {
                preview.style.display = 'none';
            }
        });

        // Mostrar mensajes
        function mostrarMensaje(texto, tipo) {
            const div = document.getElementById('mensaje');
            div.textContent = texto;
            div.className = 'mensaje ' + tipo;
            setTimeout(() => {
                div.className = 'mensaje';
                div.textContent = '';
            }, 6000);
        }

        // Enviar formulario
        document.getElementById('formRegistro').addEventListener('submit', async function(e) {
            e.preventDefault();

            const nombre = document.getElementById('nombreCocinero').value;
            const fecha = document.getElementById('fecha').value;
            const horaInicio = document.getElementById('horaInicio').value;
            const horaFin = document.getElementById('horaFin').value;
            const comentarios = document.getElementById('comentarios').value.trim();
            const fileInput = document.getElementById('foto');
            const file = fileInput.files[0];

            // Validaciones
            if (!nombre) { mostrarMensaje('Selecciona un nombre.', 'error'); return; }
            if (!fecha) { mostrarMensaje('Selecciona una fecha.', 'error'); return; }
            if (!horaInicio || !horaFin) { mostrarMensaje('Completa las horas de inicio y fin.', 'error'); return; }
            if (horaInicio >= horaFin) { mostrarMensaje('La hora de fin debe ser posterior a la de inicio.', 'error'); return; }

            const btn = document.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = '⏳ Guardando...';

            let fotoUrl = null;

            // Subir foto si existe
            if (file) {
                try {
                    console.log('📤 Subiendo foto...');
                    const fileExt = file.name.split('.').pop();
                    const fileName = `cocina_${Date.now()}.${fileExt}`;
                    const { data: uploadData, error: uploadError } = await supabase.storage
                        .from('fotos')
                        .upload(fileName, file, {
                            cacheControl: '3600',
                            upsert: false
                        });
                    if (uploadError) throw uploadError;

                    const { data: urlData } = supabase.storage
                        .from('fotos')
                        .getPublicUrl(fileName);
                    fotoUrl = urlData.publicUrl;
                    console.log('✅ Foto subida:', fotoUrl);
                } catch (error) {
                    console.error('❌ Error al subir foto:', error);
                    mostrarMensaje('Error al subir la foto: ' + error.message, 'error');
                    btn.disabled = false;
                    btn.textContent = '➕ Guardar registro';
                    return;
                }
            }

            // Guardar registro
            try {
                console.log('💾 Guardando registro...');
                const { error } = await supabase
                    .from('horas_registros')
                    .insert([{
                        nombre,
                        fecha,
                        hora_inicio: horaInicio,
                        hora_fin: horaFin,
                        comentarios,
                        foto_url: fotoUrl
                    }]);
                if (error) throw error;

                console.log('✅ Registro guardado correctamente');
                mostrarMensaje('✅ Registro guardado correctamente.', 'exito');
                document.getElementById('formRegistro').reset();
                document.getElementById('fotoPreview').style.display = 'none';
                // Establecer fecha actual de nuevo
                document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
                btn.disabled = false;
                btn.textContent = '➕ Guardar registro';
            } catch (error) {
                console.error('❌ Error al guardar registro:', error);
                mostrarMensaje('Error al guardar: ' + error.message, 'error');
                btn.disabled = false;
                btn.textContent = '➕ Guardar registro';
            }
        });

        // ------------------------------------------------------------
        // INICIALIZAR
        // ------------------------------------------------------------

        // Establecer fecha actual por defecto
        document.getElementById('fecha').value = new Date().toISOString().split('T')[0];

        // Cargar personal
        cargarPersonal();
    </script>
</body>
</html>
