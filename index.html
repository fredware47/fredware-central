<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fredware Kitchen System</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f0f4f8; margin: 0; padding: 10px; color: #333; }
        .app-container { max-width: 600px; margin: 0 auto; background: white; padding: 15px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; background: #1e293b; color: white; padding: 12px; border-radius: 8px; font-size: 18px; margin-bottom: 15px; }
        h3 { margin-top: 0; color: #444; border-bottom: 2px solid #e8f0fe; padding-bottom: 5px; font-size: 15px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: bold; margin-bottom: 4px; font-size: 13px; color: #475569; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; background: #10b981; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: background 0.2s; }
        button:hover { background: #059669; }
        .card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 12px; border-radius: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>👨‍🍳 FREDWARE CENTRAL SYSTEM v5</h2>

    <div class="card">
        <h3>🖨️ Impresión Rápida de Etiquetas (Brother 62mm)</h3>
        
        <div class="form-group">
            <label>Nombre del Producto / Elaboración:</label>
            <input type="text" id="prod-nombre" placeholder="Ej: MERMELADA DE FRESA">
        </div>

        <div class="form-group">
            <label>Lote Interno / Unidad:</label>
            <input type="text" id="prod-lote" placeholder="Ej: U-1 o LOTE-01">
        </div>

        <div class="form-group">
            <label>Fecha de Elaboración / Registro:</label>
            <input type="text" id="prod-fecha" placeholder="Ej: 07/06/2026">
        </div>

        <button onclick="enviarImpresionYRegistro()">💾 Guardar en SQL e Imprimir Sticker</button>
    </div>
</div>

<script>
    // 🔗 CONFIGURACIÓN DEL TÚNEL DE CONTROL
    // Pon aquí dentro tu enlace actual de ngrok cuando lo enciendas en el PC
    const IP_SERVIDOR_CENTRAL = "https://untried-january-thinning.ngrok-free.dev";

    // Auto-rellenar la fecha de hoy para ahorrar tiempo en el obrador
    const hoy = new Date();
    const dia = String(hoy.getDate()).padStart(2, '0');
    const mes = String(hoy.getMonth() + 1).padStart(2, '0');
    const anio = hoy.getFullYear();
    document.getElementById('prod-fecha').value = `${dia}/${mes}/${anio}`;

    function enviarImpresionYRegistro() {
        const nombre = document.getElementById('prod-nombre').value.trim().toUpperCase();
        const lote = document.getElementById('prod-lote').value.trim().toUpperCase();
        const fecha = document.getElementById('prod-fecha').value.trim();

        if (!nombre || !lote || !fecha) {
            alert("⚠️ Por favor, rellena todos los campos antes de mandar al rodillo.");
            return;
        }

        if (!IP_SERVIDOR_CENTRAL) {
            alert("⚠️ Error: No has configurado la URL de ngrok en la variable IP_SERVIDOR_CENTRAL.");
            return;
        }

        // 🎯 Paquete 1: Estructura exacta para el generador de PDF Brother
        const paqueteImpresion = {
            etiquetas: [{
                producto: nombre,
                unidad: lote,
                fecha: fecha,
                texto_qr: `PROD:${nombre}|LOTE:${lote}|F:${fecha}`
            }]
        };

        // 📦 Paquete 2: Estructura exacta para la base de datos SQLite del Almacén
        const datosBD = {
            producto: nombre,
            proveedor: "PRODUCCIÓN INTERNA",
            conservacion: "NEVERA",
            temperatura: 4.0,
            cantidad_total: 1,
            fecha_registro: new Date().toISOString()
        };

        console.log("🚀 Desplegando datos por el túnel hacia:", IP_SERVIDOR_CENTRAL);

        // Lanzamos las dos peticiones en paralelo para máxima velocidad en cocina
        Promise.all([
            fetch(`${IP_SERVIDOR_CENTRAL}/imprimir_lote`, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(paqueteImpresion) 
            }),
            fetch(`${IP_SERVIDOR_CENTRAL}/guardar_mercancia`, { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify(datosBD) 
            })
        ]).then(([res1, res2]) => {
            if(res1.ok && res2.ok) {
                alert("✅ Guardado en SQLite y orden enviada a la impresora Brother.");
                document.getElementById('prod-lote').value = ''; // Limpiamos lote para el siguiente sticker
            } else {
                alert("❌ Fallo parcial: El servidor Flask respondió pero hubo un error de proceso.");
            }
        }).catch(e => {
            console.error(e);
            alert("⚠️ Error de conexión: Asegúrate de que el servidor v5 esté corriendo y ngrok activo.");
        });
    }
</script>
</body>
</html>
